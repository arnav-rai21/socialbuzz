<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
  </defs>

  <!-- Outer gradient circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>

  <!-- Connector lines -->
  <line x1="100" y1="100" x2="50"  y2="50"  stroke="white" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="100" y1="100" x2="150" y2="50"  stroke="white" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="100" y1="100" x2="50"  y2="150" stroke="white" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="100" y1="100" x2="150" y2="150" stroke="white" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Social icon circles -->
  <circle cx="50"  cy="50"  r="22" fill="rgba(255,255,255,0.22)"/>
  <circle cx="150" cy="50"  r="22" fill="rgba(255,255,255,0.22)"/>
  <circle cx="50"  cy="150" r="22" fill="rgba(255,255,255,0.22)"/>
  <circle cx="150" cy="150" r="22" fill="rgba(255,255,255,0.22)"/>

  <!-- Center megaphone circle -->
  <circle cx="100" cy="100" r="28" fill="rgba(255,255,255,0.18)"/>

  <!-- ── Megaphone ── -->
  <!-- Speaker box -->
  <rect x="85" y="94" width="9" height="12" rx="1.5" fill="white"/>
  <!-- Horn/cone -->
  <polygon points="94,91 113,82 113,118 94,109" fill="white"/>
  <!-- Sound wave 1 -->
  <path d="M116,91 A11,11 0 0,1 116,109" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Sound wave 2 -->
  <path d="M120,87 A17,17 0 0,1 120,113" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- ── Facebook f (top-left) ── -->
  <!-- Vertical bar -->
  <rect x="48" y="38" width="5" height="24" rx="1" fill="white"/>
  <!-- Crossbar -->
  <rect x="43" y="47" width="13" height="4" rx="1" fill="white"/>
  <!-- Round top of f (mask upper-left of vertical bar to simulate curve) -->
  <path d="M48,38 Q48,34 55,34 L55,39 Q52,39 52,42 L52,47 L48,47 Z" fill="white"/>

  <!-- ── X / Twitter (top-right, 150,50) ── -->
  <line x1="142" y1="41" x2="158" y2="59" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="158" y1="41" x2="142" y2="59" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ── LinkedIn "in" (bottom-left, 50,150) ── -->
  <!-- "i" dot -->
  <circle cx="42" cy="141" r="2.5" fill="white"/>
  <!-- "i" stem -->
  <rect x="40" y="145" width="4" height="12" rx="1" fill="white"/>
  <!-- "n" left stem -->
  <rect x="47" y="145" width="4" height="12" rx="1" fill="white"/>
  <!-- "n" arch + right stem -->
  <path d="M51,147 Q51,143 57,143 Q63,143 63,149 L63,157 L59,157 L59,150 Q59,147 57,147 Q55,147 55,150 L55,157 L51,157 Z" fill="white"/>

  <!-- ── Instagram (bottom-right, 150,150) ── -->
  <!-- Outer rounded square -->
  <rect x="138" y="138" width="24" height="24" rx="7" ry="7" fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Lens circle -->
  <circle cx="150" cy="150" r="6" fill="none" stroke="white" stroke-width="2"/>
  <!-- Flash dot -->
  <circle cx="157" cy="143" r="2" fill="white"/>
</svg>
